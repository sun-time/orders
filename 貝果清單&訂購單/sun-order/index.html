<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>有時貝果 · 線上訂購</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- Cloudflare Turnstile -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    :root {
      --bg: #FBF8F3;
      --bg-card: #FFFFFF;
      --bg-muted: #F5F0E8;
      --text: #2D2317;
      --text-muted: #6B5D4C;
      --border: #E8E2D5;
      --border-strong: #D4CBB8;
      --accent: #B86F3F;
      --accent-dark: #8B5226;
      --success-bg: #EBF0E2;
      --success: #4A6B3A;
      --error-bg: #F5DDD8;
      --error: #B33A3A;
      --shadow-sm: 0 1px 2px rgba(45,35,23,.05);
      --shadow: 0 1px 3px rgba(45,35,23,.06), 0 4px 12px rgba(45,35,23,.04);
      --shadow-lg: 0 4px 12px rgba(45,35,23,.08), 0 16px 40px rgba(45,35,23,.08);
      --radius: 8px;
      --radius-lg: 14px;
      --font-display: 'Fraunces', 'Noto Serif TC', Georgia, serif;
      --font-body: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
      --maxw: 720px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    button { font-family: inherit; cursor: pointer; }
    input, textarea, select { font-family: inherit; }
    .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 1rem; }

    /* ---------- splash ---------- */
    .splash { min-height: 100vh; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: .9rem; letter-spacing: .04em; }

    /* ---------- home ---------- */
    .home {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem;
      background:
        radial-gradient(ellipse 700px 500px at 18% 15%, rgba(184,111,63,.08), transparent 60%),
        radial-gradient(ellipse 600px 480px at 85% 85%, rgba(74,107,58,.05), transparent 60%),
        var(--bg);
    }
    .home-card { width: 100%; max-width: 420px; text-align: center; }
    .home-mark { font-size: 3rem; }
    .home-card h1 { font-family: var(--font-display); font-weight: 600; font-size: 2rem; letter-spacing: -.02em; margin-top: .25rem; }
    .home-sub { color: var(--text-muted); font-size: .85rem; letter-spacing: .12em; text-transform: uppercase; margin-top: .35rem; margin-bottom: 2.25rem; }
    .home-actions { display: flex; flex-direction: column; gap: .875rem; }
    .home-actions .btn-big {
      padding: 1rem; font-size: 1.05rem; font-weight: 600; border-radius: var(--radius-lg);
      border: none; transition: background .15s, transform .05s;
    }
    .btn-big.primary { background: var(--accent); color: #fff; box-shadow: var(--shadow); }
    .btn-big.primary:hover { background: var(--accent-dark); }
    .btn-big.ghost { background: var(--bg-card); color: var(--text); border: 1px solid var(--border-strong); }
    .btn-big.ghost:hover { border-color: var(--accent); color: var(--accent-dark); }
    .btn-big:active { transform: translateY(1px); }
    .admin-link { margin-top: 2rem; font-size: .75rem; color: var(--text-muted); text-align: right; }
    .admin-link a { color: var(--text-muted); text-decoration: none; }
    .admin-link a:hover { color: var(--accent); text-decoration: underline; }
    .home-ver { margin-top: 1rem; font-size: .7rem; color: var(--border-strong); font-family: var(--font-mono); }

    /* ---------- order header ---------- */
    .pg-header {
      display: flex; align-items: center; gap: .75rem; padding: 1rem 0 .5rem;
    }
    .back-btn { background: var(--bg-muted); border: 1px solid var(--border); border-radius: var(--radius); padding: .4rem .7rem; font-size: .85rem; color: var(--text-muted); }
    .back-btn:hover { color: var(--accent-dark); border-color: var(--border-strong); }
    .pg-title { font-family: var(--font-display); font-weight: 600; font-size: 1.4rem; }

    /* ---------- sticky summary ---------- */
    .summary {
      position: sticky; top: 0; z-index: 20;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
      box-shadow: var(--shadow); padding: .75rem 1rem; margin: .25rem 0 1rem;
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    }
    .summary .nums { display: flex; gap: 1.25rem; flex: 1; min-width: 160px; }
    .summary .num-label { font-size: .72rem; color: var(--text-muted); }
    .summary .num-val { font-weight: 700; font-size: 1.05rem; }
    .summary .num-val.money { color: var(--accent-dark); }
    .summary .acts { display: flex; gap: .5rem; }
    .btn { border: none; border-radius: var(--radius); padding: .55rem .9rem; font-size: .9rem; font-weight: 600; transition: background .15s, transform .05s; }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-dark); }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
    .btn-cancel { background: var(--bg-muted); color: var(--text-muted); border: 1px solid var(--border); }
    .btn-cancel:hover { border-color: var(--border-strong); }

    /* ---------- card / section ---------- */
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.1rem 1.25rem; margin-bottom: 1rem; box-shadow: var(--shadow-sm); }
    .card h2 { font-family: var(--font-display); font-weight: 600; font-size: 1.1rem; margin-bottom: .85rem; }

    .field { display: flex; flex-direction: column; gap: .35rem; margin-bottom: .85rem; }
    .field label { font-size: .82rem; color: var(--text-muted); font-weight: 500; }
    .field label .req { color: var(--error); margin-left: .15rem; }
    .field input, .field textarea {
      font-size: .95rem; padding: .6rem .8rem; border: 1px solid var(--border-strong);
      border-radius: var(--radius); background: var(--bg-card); color: var(--text); width: 100%;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(184,111,63,.15); }
    .field textarea { resize: vertical; min-height: 64px; }
    .hint { font-size: .78rem; color: var(--text-muted); }

    /* honeypot — 隱藏，真人看不到 */
    .hp { position: absolute; left: -9999px; width: 1px; height: 1px; overflow: hidden; opacity: 0; }

    /* segmented 配送方式 */
    .seg { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .4rem; }
    .seg button {
      padding: .6rem .4rem; border: 1px solid var(--border-strong); background: var(--bg-card);
      border-radius: var(--radius); font-size: .85rem; color: var(--text-muted); font-weight: 500; transition: all .12s;
    }
    .seg button.on { background: var(--accent); border-color: var(--accent); color: #fff; }
    .seg .fee { display: block; font-size: .72rem; margin-top: .15rem; opacity: .8; }

    /* bagel list */
    .bagel-row { display: flex; align-items: center; gap: .75rem; padding: .7rem 0; border-bottom: 1px solid var(--border); }
    .bagel-row:last-child { border-bottom: none; }
    .info-btn { flex-shrink: 0; background: none; border: none; color: var(--text-muted); padding: .2rem; display: flex; }
    .info-btn:hover { color: var(--accent); }
    .bagel-main { flex: 1; min-width: 0; }
    .bagel-name { font-weight: 600; font-size: .95rem; }
    .bagel-price { font-size: .8rem; color: var(--text-muted); }
    .tag-pill { display: inline-block; font-size: .68rem; background: var(--bg-muted); color: var(--accent-dark); padding: .05rem .4rem; border-radius: 4px; margin-left: .4rem; }
    .stepper { display: flex; align-items: center; gap: .25rem; flex-shrink: 0; }
    .stepper button { width: 30px; height: 30px; border: 1px solid var(--border-strong); background: var(--bg-card); border-radius: var(--radius); font-size: 1.1rem; line-height: 1; color: var(--accent-dark); }
    .stepper button:hover { border-color: var(--accent); }
    .stepper input { width: 44px; text-align: center; padding: .35rem .2rem; border: 1px solid var(--border-strong); border-radius: var(--radius); font-size: .9rem; }
    .bagel-sub { width: 64px; text-align: right; font-weight: 600; font-size: .9rem; flex-shrink: 0; }
    .bagel-sub.zero { color: var(--border-strong); }

    /* notice */
    .notice { font-size: .85rem; color: var(--text-muted); }
    .notice li { margin: .3rem 0 .3rem 1.1rem; }
    .notice strong { color: var(--text); }

    /* alerts */
    .alert { padding: .65rem .85rem; border-radius: var(--radius); font-size: .85rem; margin-top: .5rem; }
    .alert-error { background: var(--error-bg); color: var(--error); }
    .alert-info { background: var(--bg-muted); color: var(--text-muted); }

    /* ---------- modal ---------- */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(45,35,23,.45); display: flex; align-items: center; justify-content: center; padding: 1rem; z-index: 50; }
    .modal { background: var(--bg-card); border-radius: var(--radius-lg); max-width: 460px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); position: relative; }
    .modal-pad { padding: 1.25rem; }
    .modal-close { position: absolute; top: .6rem; right: .7rem; background: none; border: none; font-size: 1.1rem; color: var(--text-muted); }
    .modal h3 { font-family: var(--font-display); font-weight: 600; font-size: 1.2rem; margin-bottom: .25rem; }
    .modal-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: var(--radius-lg) var(--radius-lg) 0 0; display: block; }

    .sum-line { display: flex; justify-content: space-between; padding: .25rem 0; font-size: .9rem; }
    .sum-line.total { border-top: 1px solid var(--border); margin-top: .4rem; padding-top: .5rem; font-weight: 700; font-size: 1.05rem; }
    .sum-line.total .money { color: var(--accent-dark); }
    .sum-items { margin: .5rem 0; }
    .sum-items .it { display: flex; justify-content: space-between; font-size: .85rem; color: var(--text-muted); padding: .15rem 0; }

    .ts-box { margin: .9rem 0; display: flex; justify-content: center; min-height: 65px; }

    .modal-acts { display: flex; gap: .6rem; margin-top: .5rem; }
    .modal-acts .btn { flex: 1; }

    /* detail */
    .detail-head { text-align: center; padding: 1.25rem 0 .5rem; }
    .order-code { font-family: var(--font-mono); font-size: 1.5rem; font-weight: 600; color: var(--accent-dark); letter-spacing: .02em; }
    .badge { display: inline-block; font-size: .75rem; padding: .15rem .6rem; border-radius: 999px; font-weight: 600; }
    .badge-new { background: var(--bg-muted); color: var(--accent-dark); }
    .badge-completed { background: var(--success-bg); color: var(--success); }
    .badge-cancelled { background: var(--error-bg); color: var(--error); }
    .kv { display: flex; justify-content: space-between; gap: 1rem; padding: .3rem 0; font-size: .9rem; border-bottom: 1px dashed var(--border); }
    .kv .k { color: var(--text-muted); flex-shrink: 0; }
    .kv .v { text-align: right; }

    .pick-row { display: flex; justify-content: space-between; align-items: center; padding: .7rem .6rem; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: .5rem; cursor: pointer; transition: border-color .12s; }
    .pick-row:hover { border-color: var(--accent); }
    .pick-code { font-family: var(--font-mono); font-weight: 600; }
    .pick-meta { font-size: .8rem; color: var(--text-muted); }

    .spin { width: 14px; height: 14px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; display: inline-block; animation: spin .6s linear infinite; vertical-align: -2px; margin-right: .4rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .bottom-space { height: 2rem; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // ============================================================
    // 設定區
    // ============================================================
    const APP_VERSION = '26.06.01';
    const SUPABASE_URL = 'https://krfrlpmgpfdntaqlyjyq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Pg8T2D8pc-kkKIDD7hF6UA_5qRDGGsS';
    // 測試用 site key（一律通過）；上線前換成你 Cloudflare 申請的正式 site key
    const TURNSTILE_SITE_KEY = '1x00000000000000000000AA';
    const LINE_URL = 'https://line.me/R/';   // TODO: 換成有時貝果的官方 Line 連結
    const ADMIN_URL = 'index.html';          // 管理頁面網址
    // ============================================================

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const { createApp, ref, reactive, computed, onMounted, nextTick } = Vue;

    // 呼叫 Edge Function：用原生 fetch + apikey 標頭，能讀到回傳的錯誤訊息
    async function callFn(name, payload) {
      const res = await fetch(SUPABASE_URL + '/functions/v1/' + name, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify(payload),
      });
      let json = {};
      try { json = await res.json(); } catch (e) { /* ignore */ }
      if (!res.ok) throw new Error(json.error || ('請求失敗 (' + res.status + ')'));
      return json;
    }

    // Turnstile 顯式渲染（等 script 載入後渲染到指定容器）
    function renderTS(containerId, onToken, onId, tries) {
      tries = tries || 0;
      if (!window.turnstile) {
        if (tries < 25) setTimeout(function () { renderTS(containerId, onToken, onId, tries + 1); }, 200);
        return;
      }
      const el = document.getElementById(containerId);
      if (!el) return;
      el.innerHTML = '';
      const id = window.turnstile.render(el, {
        sitekey: TURNSTILE_SITE_KEY,
        callback: onToken,
        'expired-callback': function () { onToken(''); },
        'error-callback': function () { onToken(''); },
      });
      onId(id);
    }
    function removeTS(id) { try { if (id !== null && window.turnstile) window.turnstile.remove(id); } catch (e) {} }

    function calcShipping(method, subtotal, cfg) {
      if (!cfg) return 0;
      if (method === 'kaohsiung') return subtotal >= cfg.kh_free_min ? 0 : cfg.kh_fee;
      if (method === 'island') return subtotal >= cfg.island_free_min ? 0 : cfg.island_fee;
      return 0; // pickup
    }

    const app = createApp({
      setup() {
        const screen = ref('home');           // home | order | detail
        const loading = ref(true);
        const loadError = ref('');
        const bagels = ref([]);
        const settings = ref(null);

        const cart = reactive({});            // { bagelId: qty }
        const form = reactive({
          name: '', phone: '', email: '', address: '', notes: '',
          delivery_method: 'pickup', website: '',
        });

        const bagelInfo = ref(null);          // 貝果簡介彈窗

        // 確認送單彈窗
        const showConfirm = ref(false);
        const confirmToken = ref('');
        const submitting = ref(false);
        const submitError = ref('');
        let confirmWidgetId = null;

        // 查詢彈窗
        const showQuery = ref(false);
        const queryType = ref('code');        // code | phone
        const queryValue = ref('');
        const queryToken = ref('');
        const querying = ref(false);
        const queryError = ref('');
        const queryResults = ref(null);       // null=未查 / [] / [orders]
        let queryWidgetId = null;

        const detailOrder = ref(null);        // 詳情頁顯示的訂單

        // ---- 載入資料 ----
        async function loadData() {
          loading.value = true; loadError.value = '';
          try {
            const b = await sb.from('bagels').select('*').eq('is_active', true).order('sort_order', { ascending: true });
            if (b.error) throw b.error;
            bagels.value = b.data || [];
            const s = await sb.from('settings').select('*').eq('id', 1).single();
            if (s.error) throw s.error;
            settings.value = s.data;
          } catch (e) {
            loadError.value = '資料載入失敗：' + (e.message || e);
          } finally {
            loading.value = false;
          }
        }
        onMounted(loadData);

        // ---- 購物車 ----
        function inc(id) { cart[id] = (cart[id] || 0) + 1; }
        function dec(id) { cart[id] = Math.max(0, (cart[id] || 0) - 1); }
        function setQty(id, ev) {
          const n = Math.max(0, Math.floor(Number(ev.target.value) || 0));
          cart[id] = n;
        }
        function qtyOf(id) { return cart[id] || 0; }

        const cartItems = computed(function () {
          return bagels.value
            .filter(function (b) { return (cart[b.id] || 0) > 0; })
            .map(function (b) { return { bagel_id: b.id, name: b.name, price: b.price, qty: cart[b.id], subtotal: b.price * cart[b.id] }; });
        });
        const subtotal = computed(function () { return cartItems.value.reduce(function (s, i) { return s + i.subtotal; }, 0); });
        const itemCount = computed(function () { return cartItems.value.reduce(function (s, i) { return s + i.qty; }, 0); });
        const shippingFee = computed(function () { return calcShipping(form.delivery_method, subtotal.value, settings.value); });
        const total = computed(function () { return subtotal.value + shippingFee.value; });

        // 配送方式的運費提示文字
        function methodFee(method) {
          if (!settings.value) return '';
          if (method === 'pickup') return '免運';
          if (method === 'kaohsiung') return '滿' + settings.value.kh_free_min + '免運 / 否則' + settings.value.kh_fee;
          if (method === 'island') return '滿' + settings.value.island_free_min + '免運 / 否則' + settings.value.island_fee;
          return '';
        }

        // ---- 導覽 ----
        function goHome() { screen.value = 'home'; }
        function goOrder() { screen.value = 'order'; }

        // ---- 貝果簡介 ----
        function openInfo(b) { bagelInfo.value = b; }
        function closeInfo() { bagelInfo.value = null; }

        // ---- 送單流程 ----
        function validateOrder() {
          if (!form.name.trim()) return '請填寫姓名';
          if (!/^09\d{8}$/.test(form.phone.replace(/\D/g, ''))) return '請填寫正確的手機號碼（09 開頭共 10 碼）';
          if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(form.email.trim())) return '請填寫正確的 Email';
          if (form.delivery_method !== 'pickup' && !form.address.trim()) return '請填寫收貨地址';
          if (cartItems.value.length === 0) return '請至少選購一項貝果';
          return '';
        }

        function clickPlaceOrder() {
          submitError.value = '';
          const err = validateOrder();
          if (err) { submitError.value = err; return; }
          showConfirm.value = true;
          confirmToken.value = '';
          nextTick(function () {
            renderTS('ts-confirm', function (t) { confirmToken.value = t; }, function (id) { confirmWidgetId = id; });
          });
        }
        function closeConfirm() {
          showConfirm.value = false;
          removeTS(confirmWidgetId); confirmWidgetId = null;
          confirmToken.value = '';
        }

        async function submitOrder() {
          submitError.value = '';
          submitting.value = true;
          try {
            const payload = {
              name: form.name.trim(),
              phone: form.phone.replace(/\D/g, ''),
              email: form.email.trim(),
              delivery_method: form.delivery_method,
              address: form.delivery_method === 'pickup' ? null : form.address.trim(),
              notes: form.notes.trim() || null,
              items: cartItems.value.map(function (i) { return { bagel_id: i.bagel_id, qty: i.qty }; }),
              website: form.website,
              turnstile_token: confirmToken.value,
            };
            const res = await callFn('submit-order', payload);
            // 用本地資料 + 回傳的編號組出詳情顯示
            detailOrder.value = {
              order_code: res.order_code,
              customer_name: payload.name, phone: payload.phone, email: payload.email,
              delivery_method: payload.delivery_method, address: payload.address, notes: payload.notes,
              items: cartItems.value, item_count: itemCount.value,
              subtotal: subtotal.value, shipping_fee: shippingFee.value, total_amount: total.value,
              status: 'new', created_at: new Date().toISOString(), justPlaced: true,
            };
            // 清空表單
            Object.keys(cart).forEach(function (k) { delete cart[k]; });
            form.name = form.phone = form.email = form.address = form.notes = '';
            form.delivery_method = 'pickup';
            closeConfirm();
            screen.value = 'detail';
          } catch (e) {
            submitError.value = e.message || '送出失敗，請再試一次';
            removeTS(confirmWidgetId); confirmWidgetId = null; confirmToken.value = '';
            nextTick(function () {
              renderTS('ts-confirm', function (t) { confirmToken.value = t; }, function (id) { confirmWidgetId = id; });
            });
          } finally {
            submitting.value = false;
          }
        }

        // ---- 查詢流程 ----
        function openQuery() {
          showQuery.value = true;
          queryValue.value = ''; queryError.value = ''; queryResults.value = null; queryToken.value = '';
          nextTick(function () {
            renderTS('ts-query', function (t) { queryToken.value = t; }, function (id) { queryWidgetId = id; });
          });
        }
        function closeQuery() {
          showQuery.value = false;
          removeTS(queryWidgetId); queryWidgetId = null; queryToken.value = '';
        }
        async function runQuery() {
          queryError.value = '';
          const v = queryValue.value.trim();
          if (!v) { queryError.value = '請輸入查詢內容'; return; }
          querying.value = true;
          try {
            const res = await callFn('query-order', { type: queryType.value, value: v, turnstile_token: queryToken.value });
            const orders = res.orders || [];
            if (orders.length === 0) { queryError.value = '查無此訂單，請確認輸入內容'; resetQueryTS(); }
            else if (orders.length === 1) { detailOrder.value = orders[0]; closeQuery(); screen.value = 'detail'; }
            else { queryResults.value = orders; }
          } catch (e) {
            queryError.value = e.message || '查詢失敗，請再試一次';
            resetQueryTS();
          } finally {
            querying.value = false;
          }
        }
        function resetQueryTS() {
          removeTS(queryWidgetId); queryWidgetId = null; queryToken.value = '';
          nextTick(function () {
            renderTS('ts-query', function (t) { queryToken.value = t; }, function (id) { queryWidgetId = id; });
          });
        }
        function pickOrder(o) { detailOrder.value = o; closeQuery(); screen.value = 'detail'; }

        function backFromDetail() { detailOrder.value = null; screen.value = 'home'; }

        // ---- 顯示輔助 ----
        function deliveryLabel(m) { return m === 'pickup' ? '自取' : m === 'kaohsiung' ? '高雄市區送貨' : '冷凍宅配（本島）'; }
        function statusLabel(s) { return s === 'completed' ? '已完成' : s === 'cancelled' ? '已取消' : '訂單成立'; }
        function statusClass(s) { return s === 'completed' ? 'badge-completed' : s === 'cancelled' ? 'badge-cancelled' : 'badge-new'; }
        function fmtTime(iso) {
          if (!iso) return '';
          try { return new Date(iso).toLocaleString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }); }
          catch (e) { return iso; }
        }

        return {
          APP_VERSION, LINE_URL, ADMIN_URL,
          screen, loading, loadError, bagels, settings, cart, form, bagelInfo,
          showConfirm, confirmToken, submitting, submitError,
          showQuery, queryType, queryValue, queryToken, querying, queryError, queryResults,
          detailOrder,
          inc, dec, setQty, qtyOf, cartItems, subtotal, itemCount, shippingFee, total, methodFee,
          goHome, goOrder, openInfo, closeInfo,
          clickPlaceOrder, closeConfirm, submitOrder,
          openQuery, closeQuery, runQuery, pickOrder, backFromDetail,
          deliveryLabel, statusLabel, statusClass, fmtTime,
        };
      },

      template: `
        <div v-if="loading" class="splash">載入中…</div>

        <!-- ============ 進入頁 ============ -->
        <div v-else-if="screen === 'home'" class="home">
          <div class="home-card">
            <div class="home-mark">🥯</div>
            <h1>有時貝果</h1>
            <div class="home-sub">Online Order</div>
            <div v-if="loadError" class="alert alert-error" style="text-align:left">{{ loadError }}</div>
            <div class="home-actions">
              <button class="btn-big primary" @click="goOrder">訂購有時貝果</button>
              <button class="btn-big ghost" @click="openQuery">查詢訂單</button>
            </div>
            <div class="admin-link"><a :href="ADMIN_URL">管理登入</a></div>
            <div class="home-ver">v{{ APP_VERSION }}</div>
          </div>
        </div>

        <!-- ============ 訂購頁 ============ -->
        <div v-else-if="screen === 'order'" class="wrap">
          <div class="pg-header">
            <button class="back-btn" @click="goHome">← 返回</button>
            <span class="pg-title">有時貝果訂購</span>
          </div>

          <!-- 浮動總覽列 -->
          <div class="summary">
            <div class="nums">
              <div><div class="num-label">總數量</div><div class="num-val">{{ itemCount }} 個</div></div>
              <div><div class="num-label">總金額</div><div class="num-val money">NT$ {{ total }}</div></div>
            </div>
            <div class="acts">
              <button class="btn btn-cancel" @click="goHome">取消</button>
              <button class="btn btn-primary" @click="clickPlaceOrder">完成訂單</button>
            </div>
          </div>

          <!-- 訂購人資訊 -->
          <div class="card">
            <h2>訂購人資訊</h2>
            <div class="field"><label>姓名<span class="req">*</span></label><input v-model="form.name" placeholder="您的姓名"></div>
            <div class="field"><label>手機<span class="req">*</span></label><input v-model="form.phone" inputmode="numeric" placeholder="0912345678"></div>
            <div class="field"><label>Email<span class="req">*</span></label><input v-model="form.email" inputmode="email" placeholder="you@example.com"></div>

            <div class="field">
              <label>配送方式<span class="req">*</span></label>
              <div class="seg">
                <button :class="{ on: form.delivery_method === 'pickup' }" @click="form.delivery_method = 'pickup'">自取<span class="fee">{{ methodFee('pickup') }}</span></button>
                <button :class="{ on: form.delivery_method === 'kaohsiung' }" @click="form.delivery_method = 'kaohsiung'">高雄市區<span class="fee">{{ methodFee('kaohsiung') }}</span></button>
                <button :class="{ on: form.delivery_method === 'island' }" @click="form.delivery_method = 'island'">冷凍宅配<span class="fee">{{ methodFee('island') }}</span></button>
              </div>
            </div>

            <div class="field" v-if="form.delivery_method !== 'pickup'">
              <label>收貨地址<span class="req">*</span></label><input v-model="form.address" placeholder="完整收件地址">
            </div>

            <div class="field"><label>備註</label><textarea v-model="form.notes" placeholder="有什麼想告訴我們的嗎？"></textarea></div>

            <!-- honeypot：真人看不到，請勿填寫 -->
            <div class="hp" aria-hidden="true"><label>Website</label><input v-model="form.website" tabindex="-1" autocomplete="off"></div>

            <p class="hint">到貨日期及付款方式將於收到訂單後與您聯繫。</p>
            <p class="hint"><a :href="LINE_URL" target="_blank" rel="noopener" style="color:var(--accent-dark)">＋ 加入有時貝果 Line</a></p>
          </div>

          <!-- 選購清單 -->
          <div class="card">
            <h2>選購清單</h2>
            <div v-for="b in bagels" :key="b.id" class="bagel-row">
              <button class="info-btn" @click="openInfo(b)" aria-label="簡介">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
              </button>
              <div class="bagel-main">
                <div class="bagel-name">{{ b.name }}<span v-if="b.tag" class="tag-pill">{{ b.tag }}</span><span v-if="b.is_new" class="tag-pill">新品</span></div>
                <div class="bagel-price">NT$ {{ b.price }} / 個</div>
              </div>
              <div class="stepper">
                <button @click="dec(b.id)">−</button>
                <input :value="qtyOf(b.id)" @input="setQty(b.id, $event)" inputmode="numeric">
                <button @click="inc(b.id)">＋</button>
              </div>
              <div class="bagel-sub" :class="{ zero: qtyOf(b.id) === 0 }">{{ qtyOf(b.id) > 0 ? '$' + (b.price * qtyOf(b.id)) : '$0' }}</div>
            </div>
          </div>

          <!-- 訂購須知 -->
          <div class="card notice">
            <h2>訂購須知</h2>
            <ul>
              <li>有時貝果嚴選天然食材，不含人工添加，手工製作，健康食材、Q 彈口感。</li>
              <li>訂單確認後會與您聯繫到貨時間及付款方式。</li>
              <li v-if="settings"><strong>高雄市區</strong>：訂購滿 {{ settings.kh_free_min }} 元可免費常溫送貨（請於三日前訂購）。</li>
              <li v-if="settings"><strong>冷凍宅配（台灣本島）</strong>：運費 NT$ {{ settings.island_fee }}，訂購滿 {{ settings.island_free_min }} 元免運費。</li>
              <li><strong>貝果保存</strong>：冷凍是最佳保鮮方法，可保存 3 週；冷藏可保鮮 3 天。</li>
            </ul>
          </div>

          <div v-if="submitError" class="alert alert-error">{{ submitError }}</div>
          <div class="bottom-space"></div>
        </div>

        <!-- ============ 訂單詳情 / 完成 ============ -->
        <div v-else-if="screen === 'detail' && detailOrder" class="wrap">
          <div class="pg-header">
            <button class="back-btn" @click="backFromDetail">← 返回</button>
            <span class="pg-title">訂單詳情</span>
          </div>

          <div class="card">
            <div class="detail-head">
              <div v-if="detailOrder.justPlaced" style="font-size:2rem">✅</div>
              <p v-if="detailOrder.justPlaced" class="hint">訂單已成立，請記下您的訂單編號：</p>
              <div class="order-code">{{ detailOrder.order_code }}</div>
              <div style="margin-top:.5rem"><span class="badge" :class="statusClass(detailOrder.status)">{{ statusLabel(detailOrder.status) }}</span></div>
            </div>
            <div class="kv"><span class="k">訂購時間</span><span class="v">{{ fmtTime(detailOrder.created_at) }}</span></div>
            <div class="kv"><span class="k">訂購人</span><span class="v">{{ detailOrder.customer_name }}</span></div>
            <div class="kv"><span class="k">手機</span><span class="v">{{ detailOrder.phone }}</span></div>
            <div class="kv"><span class="k">Email</span><span class="v">{{ detailOrder.email }}</span></div>
            <div class="kv"><span class="k">配送方式</span><span class="v">{{ deliveryLabel(detailOrder.delivery_method) }}</span></div>
            <div class="kv" v-if="detailOrder.address"><span class="k">收貨地址</span><span class="v">{{ detailOrder.address }}</span></div>
            <div class="kv" v-if="detailOrder.notes"><span class="k">備註</span><span class="v">{{ detailOrder.notes }}</span></div>
          </div>

          <div class="card">
            <h2>訂購明細</h2>
            <div class="sum-items">
              <div class="it" v-for="(it, idx) in detailOrder.items" :key="idx">
                <span>{{ it.name }} × {{ it.qty }}</span><span>$ {{ it.price * it.qty }}</span>
              </div>
            </div>
            <div class="sum-line"><span>小計（{{ detailOrder.item_count }} 個）</span><span>$ {{ detailOrder.subtotal }}</span></div>
            <div class="sum-line"><span>運費</span><span>{{ detailOrder.shipping_fee > 0 ? '$ ' + detailOrder.shipping_fee : '免運' }}</span></div>
            <div class="sum-line total"><span>總金額</span><span class="money">NT$ {{ detailOrder.total_amount }}</span></div>
          </div>
          <p class="hint" style="text-align:center">到貨日期及付款方式將於收到訂單後與您聯繫。</p>
          <div class="bottom-space"></div>
        </div>

        <!-- ============ 貝果簡介彈窗 ============ -->
        <div v-if="bagelInfo" class="modal-backdrop" @click.self="closeInfo">
          <div class="modal">
            <button class="modal-close" @click="closeInfo">✕</button>
            <img v-if="bagelInfo.image_url" :src="bagelInfo.image_url" :alt="bagelInfo.name" class="modal-img">
            <div class="modal-pad">
              <h3>{{ bagelInfo.name }}</h3>
              <div style="color:var(--accent-dark); font-weight:600; margin:.25rem 0 .5rem">NT$ {{ bagelInfo.price }}</div>
              <div style="margin-bottom:.5rem">
                <span class="tag-pill" v-if="bagelInfo.tag" style="margin-left:0">{{ bagelInfo.tag }}</span>
                <span class="tag-pill" v-if="bagelInfo.is_new" style="margin-left:.3rem">新品</span>
                <span class="tag-pill" style="margin-left:.3rem">{{ bagelInfo.is_meat ? '葷' : '素' }}</span>
              </div>
              <div style="font-size:.9rem; color:var(--text-muted)">{{ bagelInfo.description || '（無簡介）' }}</div>
            </div>
          </div>
        </div>

        <!-- ============ 確認送單彈窗 ============ -->
        <div v-if="showConfirm" class="modal-backdrop" @click.self="closeConfirm">
          <div class="modal"><div class="modal-pad">
            <h3>確認訂單</h3>
            <div class="sum-items">
              <div class="it" v-for="(it, idx) in cartItems" :key="idx"><span>{{ it.name }} × {{ it.qty }}</span><span>$ {{ it.subtotal }}</span></div>
            </div>
            <div class="sum-line"><span>小計（{{ itemCount }} 個）</span><span>$ {{ subtotal }}</span></div>
            <div class="sum-line"><span>運費（{{ deliveryLabel(form.delivery_method) }}）</span><span>{{ shippingFee > 0 ? '$ ' + shippingFee : '免運' }}</span></div>
            <div class="sum-line total"><span>總金額</span><span class="money">NT$ {{ total }}</span></div>

            <div class="ts-box"><div id="ts-confirm"></div></div>
            <div v-if="submitError" class="alert alert-error">{{ submitError }}</div>

            <div class="modal-acts">
              <button class="btn btn-cancel" @click="closeConfirm" :disabled="submitting">返回</button>
              <button class="btn btn-primary" @click="submitOrder" :disabled="submitting || !confirmToken">
                <span v-if="submitting" class="spin"></span>{{ submitting ? '送出中…' : '確認送出' }}
              </button>
            </div>
          </div></div>
        </div>

        <!-- ============ 查詢訂單彈窗 ============ -->
        <div v-if="showQuery" class="modal-backdrop" @click.self="closeQuery">
          <div class="modal"><div class="modal-pad">
            <button class="modal-close" @click="closeQuery">✕</button>
            <h3>查詢訂單</h3>

            <template v-if="!queryResults">
              <div class="seg" style="grid-template-columns:1fr 1fr; margin:.75rem 0">
                <button :class="{ on: queryType === 'code' }" @click="queryType = 'code'">用訂單編號</button>
                <button :class="{ on: queryType === 'phone' }" @click="queryType = 'phone'">用手機號碼</button>
              </div>
              <div class="field">
                <input v-model="queryValue" :placeholder="queryType === 'code' ? '例：26.0608.RAE01' : '例：0912345678'">
              </div>
              <div class="ts-box"><div id="ts-query"></div></div>
              <div v-if="queryError" class="alert alert-error">{{ queryError }}</div>
              <div class="modal-acts">
                <button class="btn btn-cancel" @click="closeQuery">取消</button>
                <button class="btn btn-primary" @click="runQuery" :disabled="querying || !queryToken">
                  <span v-if="querying" class="spin"></span>{{ querying ? '查詢中…' : '查詢' }}
                </button>
              </div>
            </template>

            <template v-else>
              <p class="hint" style="margin:.5rem 0">找到 {{ queryResults.length }} 筆訂單，請選擇：</p>
              <div class="pick-row" v-for="o in queryResults" :key="o.order_code" @click="pickOrder(o)">
                <div>
                  <div class="pick-code">{{ o.order_code }}</div>
                  <div class="pick-meta">{{ fmtTime(o.created_at) }} · {{ o.customer_name }}</div>
                </div>
                <span class="badge" :class="statusClass(o.status)">{{ statusLabel(o.status) }}</span>
              </div>
              <div class="modal-acts"><button class="btn btn-cancel" @click="closeQuery">關閉</button></div>
            </template>
          </div></div>
        </div>
      `
    });

    app.mount('#app');
  </script>
</body>
</html>
